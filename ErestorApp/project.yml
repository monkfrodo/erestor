name: ErestorApp
options:
  bundleIdPrefix: org.integros
  deploymentTarget:
    macOS: "26.0"
    iOS: "17.0"
  xcodeVersion: "16.0"

targets:
  ErestorApp:
    type: application
    platform: macOS
    sources:
      - path: ErestorApp
        excludes:
          - iOS
    dependencies:
      - sdk: Carbon.framework
    info:
      path: ErestorApp/Info.plist
      properties:
        LSUIElement: true
        CFBundleDisplayName: Erestor
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        NSAppleEventsUsageDescription: "Erestor precisa controlar apps como iTerm e Music."
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.integros.erestor
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        CODE_SIGN_ENTITLEMENTS: ErestorApp/ErestorApp.entitlements
        MACOSX_DEPLOYMENT_TARGET: "26.0"
        CODE_SIGN_IDENTITY: "-"
    entitlements:
      path: ErestorApp/ErestorApp.entitlements

  ErestorApp-iOS:
    type: application
    platform: iOS
    sources:
      - path: ErestorApp
        excludes:
          - ErestorApp.swift
          - Info.plist
          - ErestorApp.entitlements
          - Assets.xcassets
          - iOS/Assets.xcassets
          - Services/BubbleWindowController.swift
          - Services/GlobalHotkey.swift
          - Services/ActionHandler.swift
          - Views/ChatWebViewVC.swift
    info:
      path: ErestorApp/iOS/Info.plist
      properties:
        UILaunchScreen: {}
        CFBundleDisplayName: Erestor
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.integros.erestor.ios
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        CODE_SIGN_ENTITLEMENTS: ErestorApp/iOS/ErestorApp_iOS.entitlements
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        CODE_SIGN_IDENTITY: "-"
    entitlements:
      path: ErestorApp/iOS/ErestorApp_iOS.entitlements
      properties:
        aps-environment: development
