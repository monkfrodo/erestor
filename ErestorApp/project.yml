name: ErestorApp
options:
  bundleIdPrefix: org.integros
  deploymentTarget:
    macOS: "26.0"
  xcodeVersion: "16.0"

targets:
  ErestorApp:
    type: application
    platform: macOS
    sources:
      - ErestorApp
    dependencies:
      - sdk: Carbon.framework
    info:
      path: ErestorApp/Info.plist
      properties:
        LSUIElement: true
        CFBundleDisplayName: Erestor
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.integros.erestor
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        CODE_SIGN_ENTITLEMENTS: ErestorApp/ErestorApp.entitlements
        MACOSX_DEPLOYMENT_TARGET: "26.0"
        CODE_SIGN_IDENTITY: "-"
    entitlements:
      path: ErestorApp/ErestorApp.entitlements
