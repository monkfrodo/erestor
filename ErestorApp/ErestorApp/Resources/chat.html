<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    background: #2a2422;
    font-family: "SF Mono", "Menlo", "Fira Code", monospace;
    font-size: 13px;
    -webkit-font-smoothing: antialiased;
    color: #d4c4b8;
  }

  body {
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px 20px 8px 20px;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb {
    background: #4a3f3c;
    border-radius: 2px;
  }
  #messages::-webkit-scrollbar-thumb:hover { background: #5a4f4c; }

  /* Empty state */
  #empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px;
    gap: 16px;
    user-select: none;
  }

  .empty-icon {
    width: 64px;
    height: 64px;
    border-radius: 14px;
    opacity: 0.4;
    filter: invert(1);
  }

  #empty-state .title {
    font-size: 12px;
    color: #4a9f68;
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  #empty-state .subtitle {
    font-size: 11px;
    color: #7a6e66;
  }

  .capabilities {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    justify-content: center;
    max-width: 340px;
    margin-top: 4px;
  }

  .cap-chip {
    font-size: 10px;
    padding: 3px 10px;
    border: 1px solid #4a3f3c;
    color: #7a6e66;
    font-family: inherit;
    letter-spacing: 0.5px;
  }

  /* Messages */
  .msg-row {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    max-width: 100%;
    animation: fadeIn 0.15s ease-out;
  }

  .msg-row + .msg-row { margin-top: 6px; }

  .msg-content {
    flex: 1;
    line-height: 1.55;
    word-wrap: break-word;
    overflow-wrap: break-word;
    padding: 4px 0;
  }

  /* User prompt */
  .msg-row.user .msg-content {
    color: #e8dcd2;
  }

  .msg-row.user .msg-content::before {
    content: '> ';
    color: #4a9f68;
    font-weight: bold;
  }

  /* Assistant response */
  .msg-row.assistant .msg-content {
    color: #b0a498;
    padding-left: 18px;
    border-left: 1px solid #4a3f3c;
  }

  .timestamp {
    font-size: 9px;
    color: #5a4f4c;
    font-family: inherit;
    flex-shrink: 0;
    padding-top: 5px;
    user-select: none;
  }

  /* Markdown */
  .msg-content strong {
    font-weight: 600;
    color: #e8dcd2;
  }

  .msg-content em {
    font-style: italic;
    color: #6a8f7a;
  }

  .msg-content code {
    font-family: inherit;
    font-size: 12px;
    background: #1e1816;
    padding: 1px 5px;
    border: 1px solid #4a3f3c;
    color: #d4a06a;
  }

  .msg-content pre {
    background: #1e1816;
    border: 1px solid #4a3f3c;
    padding: 10px 12px;
    margin: 6px 0;
    overflow-x: auto;
    font-family: inherit;
    font-size: 12px;
    line-height: 1.5;
    color: #b0a498;
  }

  .msg-content pre code {
    background: none;
    padding: 0;
    border: none;
    color: inherit;
  }

  /* Links */
  .msg-content a {
    color: #4a9f68;
    text-decoration: none;
  }
  .msg-content a:hover { text-decoration: underline; }

  /* Lists */
  .msg-content ul, .msg-content ol {
    padding-left: 16px;
    margin: 4px 0;
  }

  /* Loading indicator */
  .loading-row {
    display: none;
    padding-left: 18px;
    border-left: 1px solid #4a3f3c;
    margin-top: 6px;
  }

  .loading-row.visible { display: block; }

  .loading-text {
    color: #7a6e66;
    font-size: 12px;
  }

  .loading-text::after {
    content: '';
    animation: dots 1.5s steps(4, end) infinite;
  }

  @keyframes dots {
    0% { content: ''; }
    25% { content: '.'; }
    50% { content: '..'; }
    75% { content: '...'; }
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  /* Cursor blink for empty state */
  .cursor {
    display: inline-block;
    width: 7px;
    height: 13px;
    background: #4a9f68;
    animation: blink 1s step-end infinite;
    vertical-align: text-bottom;
    margin-left: 2px;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }

  /* Streaming cursor -- blinks at the end of the streaming text */
  .stream-cursor {
    display: inline-block;
    width: 6px;
    height: 12px;
    background: #4a9f68;
    animation: blink 0.6s step-end infinite;
    vertical-align: text-bottom;
    margin-left: 1px;
  }

  /* Input area */
  #input-bar {
    padding: 10px 14px 12px 14px;
    border-top: 1px solid #4a3f3c;
    display: flex;
    gap: 10px;
    align-items: flex-end;
    background: #352e2c;
  }

  .prompt-symbol {
    color: #4a9f68;
    font-weight: bold;
    font-size: 13px;
    padding-bottom: 7px;
    flex-shrink: 0;
    user-select: none;
  }

  #msg-input {
    flex: 1;
    background: #2a2422;
    border: 1px solid #4a3f3c;
    border-radius: 6px;
    padding: 8px 10px;
    font-size: 13px;
    font-family: inherit;
    color: #e8dcd2;
    outline: none;
    resize: none;
    max-height: 100px;
    line-height: 1.5;
    caret-color: #4a9f68;
  }

  #msg-input:focus {
    border-color: #4a9f68;
    background: #241e1c;
  }

  #msg-input::placeholder { color: #6a5e56; }

  #send-btn {
    display: none;
  }

  /* Mic button */
  #mic-btn {
    background: #2a2422;
    border: 1px solid #4a3f3c;
    border-radius: 6px;
    color: #d4c4b8;
    font-size: 16px;
    width: 34px;
    height: 34px;
    cursor: pointer;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s, border-color 0.15s;
    padding: 0;
    line-height: 1;
  }

  #mic-btn:hover {
    border-color: #4a9f68;
    background: #352e2c;
  }

  #mic-btn.recording {
    background: #4a2020;
    border-color: #c0392b;
    color: #e74c3c;
    animation: pulse-mic 1s ease-in-out infinite;
  }

  @keyframes pulse-mic {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }
</style>
</head>
<body>

<div id="messages">
  <div id="empty-state">
    <img src="icon.png" class="empty-icon" alt="">
    <div class="title">erestor</div>
    <div class="subtitle">assistente pessoal<span class="cursor"></span></div>
    <div class="capabilities">
      <span class="cap-chip">agenda</span>
      <span class="cap-chip">lembretes</span>
      <span class="cap-chip">projetos</span>
      <span class="cap-chip">urls</span>
      <span class="cap-chip">atalhos</span>
    </div>
  </div>
  <div class="loading-row" id="loading-indicator">
    <span class="loading-text">pensando</span>
  </div>
</div>

<div id="input-bar">
  <span class="prompt-symbol">~$</span>
  <textarea id="msg-input" rows="1" placeholder="mensagem..."></textarea>
  <button id="mic-btn" title="Entrada por voz" style="display:none;">🎙</button>
</div>

<script>
  const messagesEl = document.getElementById('messages');
  const emptyState = document.getElementById('empty-state');
  const loadingIndicator = document.getElementById('loading-indicator');
  const msgInput = document.getElementById('msg-input');
  let hasMessages = false;

  function renderMarkdown(text) {
    // Code blocks
    text = text.replace(/```(\w*)\n?([\s\S]*?)```/g, function(_, lang, code) {
      return '<pre><code>' + escapeHtml(code.trim()) + '</code></pre>';
    });
    // Inline code
    text = text.replace(/`([^`]+)`/g, function(_, code) {
      return '<code>' + escapeHtml(code) + '</code>';
    });
    // Bold
    text = text.replace(/\*\*(.+?)\*\*/g, function(_, content) {
      return '<strong>' + escapeHtml(content) + '</strong>';
    });
    // Italic
    text = text.replace(/\*(.+?)\*/g, function(_, content) {
      return '<em>' + escapeHtml(content) + '</em>';
    });
    // Line breaks
    text = text.replace(/\n/g, '<br>');
    return text;
  }

  function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }

  function addMessage(role, text, timestamp) {
    if (!hasMessages) {
      emptyState.style.display = 'none';
      hasMessages = true;
    }

    const row = document.createElement('div');
    row.className = 'msg-row ' + role;

    const content = document.createElement('div');
    content.className = 'msg-content';
    content.innerHTML = renderMarkdown(stripActions(text));

    const ts = document.createElement('div');
    ts.className = 'timestamp';
    ts.textContent = timestamp ? '[' + timestamp + ']' : '';

    row.appendChild(content);
    row.appendChild(ts);

    messagesEl.insertBefore(row, loadingIndicator);
    scrollToBottom();
  }

  // --- Streaming state ---
  let streamingRow = null;
  let streamingContent = null;
  let streamingTimestamp = null;
  let streamingText = '';
  let streamScrollRAF = null;

  /**
   * Called when streaming starts. Creates the assistant message container
   * with a blinking cursor, ready to receive token chunks.
   */
  function setInputEnabled(enabled) {
    // Never disable the input — always let the user type
    msgInput.disabled = false;
    msgInput.style.opacity = '1';
    msgInput.placeholder = enabled ? 'mensagem...' : 'respondendo...';
  }

  let streamSafetyTimer = null;

  function beginStream(timestamp) {
    if (!hasMessages) {
      emptyState.style.display = 'none';
      hasMessages = true;
    }
    setInputEnabled(false);
    streamingText = '';

    // Safety: if no finalizeStream within 120s, re-enable input
    clearTimeout(streamSafetyTimer);
    streamSafetyTimer = setTimeout(function() {
      if (!msgInput.disabled) return;
      setInputEnabled(true);
      msgInput.focus();
    }, 120000);

    streamingRow = document.createElement('div');
    streamingRow.className = 'msg-row assistant';

    streamingContent = document.createElement('div');
    streamingContent.className = 'msg-content';
    streamingContent.innerHTML = '<span class="stream-cursor"></span>';

    streamingTimestamp = document.createElement('div');
    streamingTimestamp.className = 'timestamp';
    streamingTimestamp.textContent = timestamp ? '[' + timestamp + ']' : '';

    streamingRow.appendChild(streamingContent);
    streamingRow.appendChild(streamingTimestamp);
    messagesEl.insertBefore(streamingRow, loadingIndicator);
    scrollToBottom();
  }

  /**
   * Called for each token chunk during streaming.
   * Accumulates raw text and re-renders full markdown with cursor.
   */
  function stripActions(text) {
    // Remove complete action tags
    text = text.replace(/\[ACTION:\w+\|[^\]]*\]/g, '');
    // Remove partial/incomplete action tags at the end (split across chunks)
    text = text.replace(/\[ACTION:[^\]]*$/g, '');
    return text.trim();
  }

  function appendStreamChunk(text) {
    if (!streamingContent) return;
    streamingText += text;
    var display = stripActions(streamingText);
    streamingContent.innerHTML = renderMarkdown(display) + '<span class="stream-cursor"></span>';

    // Throttled scroll -- avoid layout thrashing on every token
    if (!streamScrollRAF) {
      streamScrollRAF = requestAnimationFrame(() => {
        messagesEl.scrollTo({ top: messagesEl.scrollHeight });
        streamScrollRAF = null;
      });
    }
  }

  /**
   * Called when streaming is complete. Replaces content with the final
   * clean text (cursor removed) and updates the timestamp.
   */
  function finalizeStream(fullText, timestamp) {
    if (streamingContent) {
      streamingContent.innerHTML = renderMarkdown(stripActions(fullText));
    }
    if (streamingTimestamp && timestamp) {
      streamingTimestamp.textContent = '[' + timestamp + ']';
    }
    streamingRow = null;
    streamingContent = null;
    streamingTimestamp = null;
    streamingText = '';
    streamScrollRAF = null;

    // Safety: remove any lingering stream cursors from the entire DOM
    document.querySelectorAll('.stream-cursor').forEach(function(el) { el.remove(); });

    clearTimeout(streamSafetyTimer);
    setInputEnabled(true);
    setLoading(false);
    msgInput.focus();
    scrollToBottom();
  }

  function setLoading(show) {
    if (show) {
      loadingIndicator.classList.add('visible');
    } else {
      loadingIndicator.classList.remove('visible');
    }
    scrollToBottom();
  }

  function clearMessages() {
    const rows = messagesEl.querySelectorAll('.msg-row');
    rows.forEach(r => r.remove());
    emptyState.style.display = '';
    hasMessages = false;
    streamingRow = null;
    streamingContent = null;
    streamingTimestamp = null;
    streamingText = '';
    streamScrollRAF = null;
    setLoading(false);
  }

  function showActionFeedback(text) {
    const row = document.createElement('div');
    row.className = 'msg-row assistant';
    row.style.opacity = '0.5';
    row.style.fontSize = '11px';
    const content = document.createElement('div');
    content.className = 'msg-content';
    content.style.borderLeft = '1px solid #4a9f68';
    content.style.color = '#4a9f68';
    content.style.paddingLeft = '18px';
    content.textContent = text;
    row.appendChild(content);
    messagesEl.insertBefore(row, loadingIndicator);
    scrollToBottom();
  }

  function scrollToBottom() {
    requestAnimationFrame(() => {
      messagesEl.scrollTo({ top: messagesEl.scrollHeight, behavior: 'smooth' });
    });
  }

  function handleSend() {
    const text = msgInput.value.trim();
    if (!text) return;
    msgInput.value = '';
    msgInput.style.height = 'auto';
    try {
      webkit.messageHandlers.chat.postMessage({ type: 'send', text: text });
    } catch(e) {
      console.log('No native handler:', e);
    }
  }

  // Auto-resize textarea
  msgInput.addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 100) + 'px';
  });

  // Enter to send, Shift+Enter for newline
  msgInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      handleSend();
    }
  });

  // Dictation removed — Web Speech API not available in WKWebView.
  // Future: implement via native Swift SFSpeechRecognizer bridge.
</script>
</body>
</html>
