<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    background: transparent;
    font-family: "SF Mono", "Menlo", "Fira Code", monospace;
    font-size: 13px;
    -webkit-font-smoothing: antialiased;
    color: #a0a0a0;
  }

  body {
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px 20px 8px 20px;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb {
    background: #1e1e24;
    border-radius: 2px;
  }
  #messages::-webkit-scrollbar-thumb:hover { background: #2a2a32; }

  /* Empty state */
  #empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px;
    gap: 16px;
    user-select: none;
  }

  .empty-icon {
    width: 64px;
    height: 64px;
    border-radius: 14px;
    opacity: 0.4;
    filter: invert(1);
  }

  #empty-state .title {
    font-size: 12px;
    color: #4a9f68;
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  #empty-state .subtitle {
    font-size: 11px;
    color: #333;
  }

  .capabilities {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    justify-content: center;
    max-width: 340px;
    margin-top: 4px;
  }

  .cap-chip {
    font-size: 10px;
    padding: 3px 10px;
    border: 1px solid #1a1a20;
    color: #3a3a42;
    font-family: inherit;
    letter-spacing: 0.5px;
  }

  /* Messages */
  .msg-row {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    max-width: 100%;
    animation: fadeIn 0.15s ease-out;
  }

  .msg-row + .msg-row { margin-top: 6px; }

  .msg-content {
    flex: 1;
    line-height: 1.55;
    word-wrap: break-word;
    overflow-wrap: break-word;
    padding: 4px 0;
  }

  /* User prompt */
  .msg-row.user .msg-content {
    color: #c0c0c0;
  }

  .msg-row.user .msg-content::before {
    content: '> ';
    color: #4a9f68;
    font-weight: bold;
  }

  /* Assistant response */
  .msg-row.assistant .msg-content {
    color: #888;
    padding-left: 18px;
    border-left: 1px solid #1a1a20;
  }

  .timestamp {
    font-size: 9px;
    color: #2a2a32;
    font-family: inherit;
    flex-shrink: 0;
    padding-top: 5px;
    user-select: none;
  }

  /* Markdown */
  .msg-content strong {
    font-weight: 600;
    color: #c8c8c8;
  }

  .msg-content em {
    font-style: italic;
    color: #6a8f7a;
  }

  .msg-content code {
    font-family: inherit;
    font-size: 12px;
    background: #111114;
    padding: 1px 5px;
    border: 1px solid #1a1a20;
    color: #d4a06a;
  }

  .msg-content pre {
    background: #0d0d10;
    border: 1px solid #1a1a20;
    padding: 10px 12px;
    margin: 6px 0;
    overflow-x: auto;
    font-family: inherit;
    font-size: 12px;
    line-height: 1.5;
    color: #7a7a82;
  }

  .msg-content pre code {
    background: none;
    padding: 0;
    border: none;
    color: inherit;
  }

  /* Links */
  .msg-content a {
    color: #4a9f68;
    text-decoration: none;
  }
  .msg-content a:hover { text-decoration: underline; }

  /* Lists */
  .msg-content ul, .msg-content ol {
    padding-left: 16px;
    margin: 4px 0;
  }

  /* Loading indicator */
  .loading-row {
    display: none;
    padding-left: 18px;
    border-left: 1px solid #1a1a20;
    margin-top: 6px;
  }

  .loading-row.visible { display: block; }

  .loading-text {
    color: #2a2a32;
    font-size: 12px;
  }

  .loading-text::after {
    content: '';
    animation: dots 1.5s steps(4, end) infinite;
  }

  @keyframes dots {
    0% { content: ''; }
    25% { content: '.'; }
    50% { content: '..'; }
    75% { content: '...'; }
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  /* Cursor blink for empty state */
  .cursor {
    display: inline-block;
    width: 7px;
    height: 13px;
    background: #4a9f68;
    animation: blink 1s step-end infinite;
    vertical-align: text-bottom;
    margin-left: 2px;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }

  /* Streaming cursor -- blinks at the end of the streaming text */
  .stream-cursor {
    display: inline-block;
    width: 6px;
    height: 12px;
    background: #4a9f68;
    animation: blink 0.6s step-end infinite;
    vertical-align: text-bottom;
    margin-left: 1px;
  }

  /* Input area */
  #input-bar {
    padding: 10px 16px 14px 16px;
    border-top: 1px solid #111114;
    display: flex;
    gap: 10px;
    align-items: flex-end;
    background: transparent;
  }

  .prompt-symbol {
    color: #4a9f68;
    font-weight: bold;
    font-size: 13px;
    padding-bottom: 7px;
    flex-shrink: 0;
    user-select: none;
  }

  #msg-input {
    flex: 1;
    background: transparent;
    border: none;
    padding: 6px 0;
    font-size: 13px;
    font-family: inherit;
    color: #c0c0c0;
    outline: none;
    resize: none;
    max-height: 100px;
    line-height: 1.5;
    caret-color: #4a9f68;
  }

  #msg-input::placeholder { color: #2a2a32; }

  #send-btn {
    display: none;
  }
</style>
</head>
<body>

<div id="messages">
  <div id="empty-state">
    <img src="icon.png" class="empty-icon" alt="">
    <div class="title">erestor</div>
    <div class="subtitle">assistente pessoal<span class="cursor"></span></div>
    <div class="capabilities">
      <span class="cap-chip">agenda</span>
      <span class="cap-chip">lembretes</span>
      <span class="cap-chip">projetos</span>
      <span class="cap-chip">urls</span>
      <span class="cap-chip">atalhos</span>
    </div>
  </div>
  <div class="loading-row" id="loading-indicator">
    <span class="loading-text">pensando</span>
  </div>
</div>

<div id="input-bar">
  <span class="prompt-symbol">~$</span>
  <textarea id="msg-input" rows="1" placeholder="mensagem..."></textarea>
</div>

<script>
  const messagesEl = document.getElementById('messages');
  const emptyState = document.getElementById('empty-state');
  const loadingIndicator = document.getElementById('loading-indicator');
  const msgInput = document.getElementById('msg-input');
  let hasMessages = false;

  function renderMarkdown(text) {
    // Code blocks
    text = text.replace(/```(\w*)\n?([\s\S]*?)```/g, function(_, lang, code) {
      return '<pre><code>' + escapeHtml(code.trim()) + '</code></pre>';
    });
    // Inline code
    text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
    // Bold
    text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    // Italic
    text = text.replace(/\*(.+?)\*/g, '<em>$1</em>');
    // Line breaks
    text = text.replace(/\n/g, '<br>');
    return text;
  }

  function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }

  function addMessage(role, text, timestamp) {
    if (!hasMessages) {
      emptyState.style.display = 'none';
      hasMessages = true;
    }

    const row = document.createElement('div');
    row.className = 'msg-row ' + role;

    const content = document.createElement('div');
    content.className = 'msg-content';
    content.innerHTML = renderMarkdown(text);

    const ts = document.createElement('div');
    ts.className = 'timestamp';
    ts.textContent = timestamp ? '[' + timestamp + ']' : '';

    row.appendChild(content);
    row.appendChild(ts);

    messagesEl.insertBefore(row, loadingIndicator);
    scrollToBottom();
  }

  // --- Streaming state ---
  let streamingRow = null;
  let streamingContent = null;
  let streamingTimestamp = null;
  let streamingText = '';
  let streamScrollRAF = null;

  /**
   * Called when streaming starts. Creates the assistant message container
   * with a blinking cursor, ready to receive token chunks.
   */
  function beginStream(timestamp) {
    if (!hasMessages) {
      emptyState.style.display = 'none';
      hasMessages = true;
    }
    streamingText = '';

    streamingRow = document.createElement('div');
    streamingRow.className = 'msg-row assistant';

    streamingContent = document.createElement('div');
    streamingContent.className = 'msg-content';
    streamingContent.innerHTML = '<span class="stream-cursor"></span>';

    streamingTimestamp = document.createElement('div');
    streamingTimestamp.className = 'timestamp';
    streamingTimestamp.textContent = timestamp ? '[' + timestamp + ']' : '';

    streamingRow.appendChild(streamingContent);
    streamingRow.appendChild(streamingTimestamp);
    messagesEl.insertBefore(streamingRow, loadingIndicator);
    scrollToBottom();
  }

  /**
   * Called for each token chunk during streaming.
   * Accumulates raw text and re-renders full markdown with cursor.
   */
  function appendStreamChunk(text) {
    if (!streamingContent) return;
    streamingText += text;
    streamingContent.innerHTML = renderMarkdown(streamingText) + '<span class="stream-cursor"></span>';

    // Throttled scroll -- avoid layout thrashing on every token
    if (!streamScrollRAF) {
      streamScrollRAF = requestAnimationFrame(() => {
        messagesEl.scrollTo({ top: messagesEl.scrollHeight });
        streamScrollRAF = null;
      });
    }
  }

  /**
   * Called when streaming is complete. Replaces content with the final
   * clean text (cursor removed) and updates the timestamp.
   */
  function finalizeStream(fullText, timestamp) {
    if (streamingContent) {
      streamingContent.innerHTML = renderMarkdown(fullText);
    }
    if (streamingTimestamp && timestamp) {
      streamingTimestamp.textContent = '[' + timestamp + ']';
    }
    streamingRow = null;
    streamingContent = null;
    streamingTimestamp = null;
    streamingText = '';
    streamScrollRAF = null;
    scrollToBottom();
  }

  function setLoading(show) {
    if (show) {
      loadingIndicator.classList.add('visible');
    } else {
      loadingIndicator.classList.remove('visible');
    }
    scrollToBottom();
  }

  function clearMessages() {
    const rows = messagesEl.querySelectorAll('.msg-row');
    rows.forEach(r => r.remove());
    emptyState.style.display = '';
    hasMessages = false;
    streamingRow = null;
    streamingContent = null;
    streamingTimestamp = null;
    streamingText = '';
    streamScrollRAF = null;
    setLoading(false);
  }

  function scrollToBottom() {
    requestAnimationFrame(() => {
      messagesEl.scrollTo({ top: messagesEl.scrollHeight, behavior: 'smooth' });
    });
  }

  function handleSend() {
    const text = msgInput.value.trim();
    if (!text) return;
    msgInput.value = '';
    msgInput.style.height = 'auto';
    try {
      webkit.messageHandlers.chat.postMessage({ type: 'send', text: text });
    } catch(e) {
      console.log('No native handler:', e);
    }
  }

  // Auto-resize textarea
  msgInput.addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 100) + 'px';
  });

  // Enter to send, Shift+Enter for newline
  msgInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      handleSend();
    }
  });
</script>
</body>
</html>
